<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/test_style.css">
    <link rel="manifest" href="/wings_one/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/wings_one/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body style="background-color: #fdfcf8; margin: 0; padding: 0;">

<div id="sticky-header" style="position: sticky; top: 0; background: #fdfcf8; padding: 15px; border-bottom: 2px solid #333; z-index: 9999; display: flex; flex-direction: column; gap: 10px;">
    
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 15px;">
        <a href="{{ site.baseurl }}/index.html" style="text-decoration: none; font-weight: bold; color: #007bff; font-family: sans-serif; font-size: 16px;">🏠 Home</a>
        
        <audio id="header-audio" controls style="height: 54px; flex-grow: 1;">
            <source src="{{ page.audio_url }}" type="audio/mpeg">
        </audio>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-around; background: #f1f1f1; padding: 8px; border-radius: 8px; gap: 20px; flex-wrap: wrap;">
        
        <div style="display: flex; align-items: center; gap: 8px;">
            <label style="font-size: 12px; font-weight: bold; font-family: sans-serif;">Speed: </label>
            <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" style="width: 80px;">
            <span id="speedValue" style="font-size: 12px; font-weight: bold; font-family: sans-serif; min-width: 30px;">1.0x</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label style="font-size: 12px; font-weight: bold; font-family: sans-serif;">Font: </label>
            <input type="range" id="sizeSlider" min="16" max="40" value="20" style="width: 80px;">
            <span id="sizeValue" style="font-size: 12px; font-weight: bold; font-family: sans-serif; min-width: 40px;">20px</span>
        </div>
    </div>
</div>

<div class="container" style="padding: 20px; max-width: 800px; margin: 0 auto;">
    {{ content }}
</div>

<script>
    const audio = document.getElementById('header-audio');
    
    // Playback Speed Logic
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    speedSlider.oninput = function() {
        audio.playbackRate = this.value;
        speedValue.innerHTML = this.value + 'x';
    };

    // Font Size Logic
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeValue = document.getElementById('sizeValue');
    sizeSlider.oninput = function() {
        const val = this.value + 'px';
        sizeValue.innerHTML = val;
        document.documentElement.style.setProperty('--reader-size', val);
    };

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/wings_one/sw.js')
                .then(reg => console.log('Service Worker registered!'))
                .catch(err => console.log('Service Worker failed:', err));
        });
    }
</script>

</body>
</html>
